name: Build dashboard data

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

concurrency:
  group: trader-dashboard-data
  cancel-in-progress: true

jobs:
  build-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Install Node deps
        run: |
          npm install --no-audit --no-fund --legacy-peer-deps
          npx vite --version

      - name: Build dashboard snapshots
        env:
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
          ALPACA_BASE_URL: https://paper-api.alpaca.markets
        run: python scripts/build_dashboard_data.py

      - name: Build React dashboard
        env:
          VITE_GIT_COMMIT: ${{ github.sha }}
          VITE_BUILD_TIME: ${{ github.run_started_at }}
        run: |
          npm run build
          python - <<'PY'
          import json, os, datetime
          open('site/build.json','w',encoding='utf-8').write(json.dumps({
            'commit': os.environ.get('VITE_GIT_COMMIT','')[:7],
            'built_at': os.environ.get('VITE_BUILD_TIME') or datetime.datetime.now(datetime.UTC).isoformat(),
            'source': 'github-actions'
          }, indent=2))
          PY

      - name: Commit updated snapshots
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git pull --rebase origin main
          git add data/*.json site/data/*.json site/build.json
          git diff --cached --quiet || git commit -m "chore: refresh dashboard data"
          git push

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Cloudflare secrets missing, skipping Pages deploy. Local OpenClaw deploy can still publish."
            exit 0
          fi
          npx wrangler pages deploy site --project-name trader-dashboard --branch main
