name: Build dashboard data

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

jobs:
  build-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Build dashboard snapshots
        env:
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
          ALPACA_BASE_URL: https://paper-api.alpaca.markets
        run: python scripts/build_dashboard_data.py

      - name: Commit updated snapshots
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add data/*.json site/data/*.json
          git diff --cached --quiet || git commit -m "chore: refresh dashboard data"
          git push

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site --project-name trader-dashboard --branch main
